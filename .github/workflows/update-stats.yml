name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  workflow_dispatch:        # manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Card (Light)
        uses: stn1slv/github-stats-card@v1.1.4
        with:
          card-type: user-stats
          username: jhq223
          token: ${{ secrets.GITHUB_TOKEN }}
          output: img/stats-light.svg
          theme: default
          show-icons: true
          hide-border: true

      - name: Generate Stats Card (Dark)
        uses: stn1slv/github-stats-card@v1.1.4
        with:
          card-type: user-stats
          username: jhq223
          token: ${{ secrets.GITHUB_TOKEN }}
          output: img/stats-dark.svg
          theme: vue-dark
          show-icons: true
          hide-border: true

      - name: Generate Top Languages (Light)
        uses: stn1slv/github-stats-card@v1.1.4
        with:
          card-type: top-langs
          username: jhq223
          token: ${{ secrets.GITHUB_TOKEN }}
          output: img/langs-light.svg
          theme: default
          hide-border: true
          layout: compact
          langs-count: 6

      - name: Generate Top Languages (Dark)
        uses: stn1slv/github-stats-card@v1.1.4
        with:
          card-type: top-langs
          username: jhq223
          token: ${{ secrets.GITHUB_TOKEN }}
          output: img/langs-dark.svg
          theme: vue-dark
          hide-border: true
          layout: compact
          langs-count: 6

      - name: Commit & Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add img/*.svg
          git diff --staged --quiet || git commit -m "chore: update stats [skip ci]"
          git push
